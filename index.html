<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Brazo Robot</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #1e1e1e;
            border-bottom: 1px solid #333;
        }

        .btn-ble {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-ble.connected {
            background-color: #28a745;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow-y: auto;
            align-items: flex-start;
            background-color: #121212;
            padding: 15px;
            gap: 15px;
        }

        /* --- TARJETA DE CONTROL --- */
        .tarjeta-control {
            display: inline-flex;
            flex-direction: row;
            background-color: #181818;
            border: 2px solid #444;
            border-radius: 12px;
            overflow: hidden;
            height: 275px !important;
            max-height: 275px !important;
            width: auto;
            max-width: 100%;
        }

        /* --- PANEL DE SLIDERS --- */
        .controls-panel {
            width: 300px;
            min-width: 300px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background-color: #181818;
            border: 1px solid #333;
            border-radius: 8px 0 0 8px; 
            box-sizing: border-box;
            height: 100%;
        }

        .speed-panel {
            border-bottom: 2px solid #333;
            padding-bottom: 6px;
            margin-bottom: 2px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 2px;
            background: #222;
            padding: 2px 3px;
            border-radius: 8px;
            border: 1px solid #333;
            height: 32px;
            box-sizing: border-box;
        }

        .label-name {
            width: 55px !important;
            min-width: 55px !important;
            font-weight: bold;
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
        }

        .slider {
            flex: 2;
            min-width: 0;
            accent-color: #007acc;
            cursor: pointer;
        }

        .angle-box {
            width: 45px;
            min-width: 45px;
            background-color: #000;
            border: 1px solid #444;
            border-radius: 4px;
            text-align: center;
            padding: 2px 0;
            font-family: monospace;
            font-size: 0.8rem;
            color: #00ffcc;
        }

        /* --- VISOR DERECHO --- */
        .viewer-panel {
            flex: 1;
            display: flex;
            justify-content: flex-start; 
            align-items: center;
            background-color: #121212;
            border: 1px solid #333;
            border-left: none; 
            border-radius: 0 8px 8px 0; 
            box-sizing: border-box;
            height: 100%;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        .viewer-panel img {
            height: 100% !important;
            width: auto !important;
            object-fit: contain;
            display: block;
            margin-left: 0 !important;
            margin-right: auto;
        }

        /* --- ESTILOS PANEL MEMO / EDITABLE --- */
        .memo-panel {
            width: 100%;
            max-width: 650px;
            background-color: #181818;
            border: 2px solid #444;
            border-radius: 12px;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .memo-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .btn-memo {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn-play { background-color: #28a745; color: white; }
        .btn-clear { background-color: #dc3545; color: white; }
        .btn-file { background-color: #007acc; color: white; }

        /* --- INDICADOR DE TIEMPO / PLAYBACK --- */
        .timer-badge {
            margin-left: auto;
            background-color: #000;
            border: 1px solid #ff9900;
            color: #ff9900;
            padding: 6px 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85rem;
            font-weight: bold;
            display: none;
            align-items: center;
            gap: 6px;
        }

        .file-label {
            display: inline-block;
            cursor: pointer;
        }

        input[type="file"] {
            display: none;
        }

        /* DIV EDITABLE */
        .memo-box {
            width: 100%;
            height: 150px;
            background-color: #0d0d0d;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            box-sizing: border-box;
            overflow-y: auto;
            white-space: pre-wrap;
            outline: none;
            color: #00ffcc;
        }

        /* Clases para sintaxis de comandos */
        .cmd-line {
            display: block;
            margin: 0;
            padding: 1px 0;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .cmd-valid {
            color: #00ffcc;
        }

        .cmd-invalid {
            color: #ff4d4d !important;
            background-color: rgba(255, 77, 77, 0.15);
            text-decoration: underline wavy #ff4d4d;
            border-radius: 2px;
        }

        /* CLASE DE LÍNEA EN EJECUCIÓN (PLAY) */
        .cmd-executing {
            background-color: rgba(255, 153, 0, 0.25) !important;
            color: #ffcc00 !important;
            border-left: 3px solid #ff9900;
            padding-left: 4px;
            border-radius: 2px;
        }

        /* MODAL CONFIRMACIÓN BORRADO */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-box {
            background-color: #1e1e1e;
            color: white;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #444;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <header>
        <h2 style="margin:0; font-size:1.3rem;">Brazo Robótico 1.2</h2>
        <button id="connectBle" class="btn-ble">🔌 Conectar BLE</button>
    </header>

    <div class="main-container">
        
        <div class="tarjeta-control">
            <div class="controls-panel">
                <div class="speed-panel">
                    <div class="control-group" style="background: #2a2015; border-color: #ff990044;">
                        <span class="label-name" style="color: #ff9900;">Velocidad</span>
                        <input type="range" min="1" max="45" value="10" class="slider" id="speedSlider" style="accent-color: #ff9900;">
                        <span class="angle-box" id="speedBox" style="color: #ff9900;">10°/s</span>
                    </div>
                </div>

                <div class="control-group"><span class="label-name">Pinza</span><input type="range" min="0" max="180" value="90" class="slider" id="pinza"><span class="angle-box" id="pinzaBox">90°</span></div>
                <div class="control-group"><span class="label-name">M. Giro</span><input type="range" min="0" max="270" value="135" class="slider" id="munecaGiro"><span class="angle-box" id="munecaGiroBox">135°</span></div>
                <div class="control-group"><span class="label-name">Muñeca</span><input type="range" min="0" max="270" value="135" class="slider" id="muneca"><span class="angle-box" id="munecaBox">135°</span></div>
                <div class="control-group"><span class="label-name">Codo</span><input type="range" min="0" max="270" value="135" class="slider" id="codo"><span class="angle-box" id="codoBox">135°</span></div>
                <div class="control-group"><span class="label-name">Hombro</span><input type="range" min="0" max="270" value="135" class="slider" id="hombro"><span class="angle-box" id="hombroBox">135°</span></div>
                <div class="control-group"><span class="label-name">Base</span><input type="range" min="0" max="270" value="135" class="slider" id="rotacion"><span class="angle-box" id="rotacionBox">135°</span></div>
            </div>

            <div class="viewer-panel">
                <img src="RobotArmPic.png" alt="Brazo Robot">
            </div>
        </div>

        <!-- PANEL DE MEMO / EDITABLE CON RESALTADO -->
        <div class="memo-panel">
            <div class="memo-controls">
                <button id="btnPlay" class="btn-memo btn-play" onclick="playMemo()">▶️ Reproducir</button>
                <button class="btn-memo btn-clear" onclick="solicitarLimpieza()">🗑️ Borrar</button>
                <button class="btn-memo btn-file" onclick="guardarArchivo()">💾 Guardar .txt</button>
                <label class="btn-memo btn-file file-label">
                    📂 Cargar .txt
                    <input type="file" id="fileInput" accept=".txt" onchange="cargarArchivo(event)">
                </label>

                <!-- INSIGNIA DEL TEMPORIZADOR -->
                <div id="timerBadge" class="timer-badge">
                    ⏳ <span id="timerText">0.0s</span>
                </div>
            </div>
            <!-- Div Editable -->
            <div id="memoBox" class="memo-box" contenteditable="true" spellcheck="false"></div>
        </div>

    </div>

    <!-- MODAL DE CONFIRMACIÓN -->
    <div id="modalConfirm" class="modal-overlay">
        <div class="modal-box">
            <h3 style="margin-top:0;">⚠️ Confirmación</h3>
            <p style="font-size: 0.9rem; color: #ccc;">¿Deseas guardar la secuencia actual en un archivo .txt antes de borrar?</p>
            <div class="modal-buttons">
                <button class="btn-memo btn-file" onclick="responderBorrado('si')">💾 Sí, Guardar y Borrar</button>
                <button class="btn-memo btn-clear" onclick="responderBorrado('no')">🗑️ No, Solo Borrar</button>
                <button class="btn-memo" style="background:#555; color:white;" onclick="responderBorrado('cancelar')">✖️ Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let txCharacteristic = null;
        const connectBtn = document.getElementById('connectBle');
        const speedSlider = document.getElementById('speedSlider');
        const speedBox = document.getElementById('speedBox');
        const memoBox = document.getElementById('memoBox');
        const btnPlay = document.getElementById('btnPlay');
        const timerBadge = document.getElementById('timerBadge');
        const timerText = document.getElementById('timerText');

        let tiempoUltimoComando = 0;

        // Expresión Regular estricta
        const regexComandoValido = /^\d+,(pinza|munecaGiro|muneca|codo|hombro|rotacion):\d+,v:\d+$/;

        speedSlider.addEventListener('input', () => {
            speedBox.innerText = speedSlider.value + '°/s';
        });

        const ids = ['pinza', 'munecaGiro', 'muneca', 'codo', 'hombro', 'rotacion'];
        ids.forEach(id => {
            const slider = document.getElementById(id);
            const box = document.getElementById(id + 'Box');

            slider.addEventListener('input', () => {
                box.innerText = slider.value + '°';
            });

            slider.addEventListener('change', () => {
                box.innerText = slider.value + '°';
                enviarTrama(id, slider.value);
            });
        });

        connectBtn.addEventListener('click', async () => {
            try {
                connectBtn.innerText = "🔍 Buscando...";
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
                });

                connectBtn.innerText = "⚡ Conectando...";
                const server = await device.gatt.connect();
                
                try {
                    const service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
                    txCharacteristic = await service.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');
                } catch (e) {
                    console.log("No usa servicio UART estándar, pero conectado.");
                }

                connectBtn.innerText = "🟢 BLE Conectado";
                connectBtn.classList.add('connected');
            } catch (error) {
                console.error(error);
                connectBtn.innerText = "❌ Error / Cancelado";
                connectBtn.classList.remove('connected');
            }
        });

        // --- SISTEMA UNIFICADO DE TRANSMISIÓN HÍBRIDO (BLE / WI-FI) ---
        function transmitirComando(comando) {
            const cadena = comando + '\n';
            
            if (txCharacteristic) {
                // 1. Envío por BLE si la característica está activa
                const encoder = new TextEncoder();
                txCharacteristic.writeValue(encoder.encode(cadena))
                    .catch(err => console.log("Error al transmitir por BLE:", err));
            } else {
                // 2. Fallback HTTP Wi-Fi si no hay BLE (servido desde el ESP32)
                fetch(`/cmd?data=${encodeURIComponent(comando)}`)
                    .catch(err => console.log("Modo local sin conexión ESP32 / Error HTTP:", err));
            }
        }

        function enviarTrama(articulacion, angulo) {
            const velocidad = speedSlider.value;
            const tramaSinSalto = `${articulacion}:${angulo},v:${velocidad}`;
            
            console.log("Enviando comando:", tramaSinSalto);
            transmitirComando(tramaSinSalto);

            registrarEnMemo(tramaSinSalto);
        }

        // --- REGISTRO AUTOMÁTICO EN EL MEMO ---
        function registrarEnMemo(comando) {
            const ahora = Date.now();
            const textoActual = memoBox.innerText.trim();

            let delayRelativo = 0;
            if (textoActual !== "" && tiempoUltimoComando > 0) {
                delayRelativo = ahora - tiempoUltimoComando;
            }

            tiempoUltimoComando = ahora;

            const lineaTexto = `${delayRelativo},${comando}`;
            
            const divLinea = document.createElement('div');
            divLinea.className = 'cmd-line cmd-valid';
            divLinea.innerText = lineaTexto;

            memoBox.appendChild(divLinea);
            memoBox.scrollTop = memoBox.scrollHeight;
        }

        // --- VALIDACIÓN EN ENTER ---
        memoBox.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();

                const sel = window.getSelection();
                if (!sel.rangeCount) return;

                let nodoActual = sel.anchorNode;
                while (nodoActual && nodoActual.parentNode !== memoBox && nodoActual !== memoBox) {
                    nodoActual = nodoActual.parentNode;
                }

                if (!nodoActual || nodoActual === memoBox) {
                    const textoCompleto = memoBox.innerText.trim();
                    memoBox.innerHTML = '';
                    nodoActual = document.createElement('div');
                    nodoActual.className = 'cmd-line';
                    nodoActual.innerText = textoCompleto;
                    memoBox.appendChild(nodoActual);
                }

                const textoLinea = nodoActual.innerText.replace(/\u00a0/g, " ").trim();
                if (textoLinea) {
                    const esValido = regexComandoValido.test(textoLinea);
                    nodoActual.className = 'cmd-line ' + (esValido ? 'cmd-valid' : 'cmd-invalid');
                } else {
                    nodoActual.className = 'cmd-line';
                }

                const nuevaLinea = document.createElement('div');
                nuevaLinea.className = 'cmd-line';
                nuevaLinea.innerHTML = '<br>';

                if (nodoActual.nextSibling) {
                    memoBox.insertBefore(nuevaLinea, nodoActual.nextSibling);
                } else {
                    memoBox.appendChild(nuevaLinea);
                }

                const rangeNuevo = document.createRange();
                rangeNuevo.setStart(nuevaLinea, 0);
                rangeNuevo.collapse(true);
                sel.removeAllRanges();
                sel.addRange(rangeNuevo);

                memoBox.scrollTop = memoBox.scrollHeight;
            }
        });

        // --- DETECCIÓN DE PASTE ---
        memoBox.addEventListener('paste', (e) => {
            e.preventDefault();
            
            const textoPegado = (e.clipboardData || window.clipboardData).getData('text/plain');
            
            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            selection.deleteFromDocument();
            selection.getRangeAt(0).insertNode(document.createTextNode(textoPegado));
            
            selection.collapseToEnd();
            reparsearLineas();
        });

        memoBox.addEventListener('blur', () => {
            reparsearLineas();
        });

        // --- PURGAR LÍNEAS VACÍAS ---
        function purgarLineasVacias() {
            const textoCompleto = memoBox.innerText.replace(/\u00a0/g, " ");
            const lineas = textoCompleto.split('\n');
            
            memoBox.innerHTML = ''; 

            lineas.forEach(lineaStr => {
                const limpia = lineaStr.trim();
                if (!limpia) return;

                const divLinea = document.createElement('div');
                divLinea.className = 'cmd-line';

                if (regexComandoValido.test(limpia)) {
                    divLinea.classList.add('cmd-valid');
                } else {
                    divLinea.classList.add('cmd-invalid');
                }

                divLinea.innerText = limpia;
                memoBox.appendChild(divLinea);
            });
        }

        // --- REPARSIDEADO Y COLOREADO DE SINTAXIS ---
        function reparsearLineas() {
            const textoCompleto = memoBox.innerText.replace(/\u00a0/g, " ");
            const lineas = textoCompleto.split('\n');
            
            memoBox.innerHTML = ''; 

            lineas.forEach(lineaStr => {
                const limpia = lineaStr.trim();
                const divLinea = document.createElement('div');
                divLinea.className = 'cmd-line';

                if (!limpia) {
                    divLinea.innerHTML = '<br>';
                } else if (regexComandoValido.test(limpia)) {
                    divLinea.classList.add('cmd-valid');
                    divLinea.innerText = limpia;
                } else {
                    divLinea.classList.add('cmd-invalid');
                    divLinea.innerText = limpia;
                }

                memoBox.appendChild(divLinea);
            });
        }

        // --- FUNCIÓN DE ESPERA CON CUENTA REGRESIVA VISUAL ---
        function esperarConTimer(ms) {
            return new Promise(resolve => {
                if (ms <= 0) {
                    resolve();
                    return;
                }

                const inicio = Date.now();
                const intervalo = setInterval(() => {
                    const transcurrido = Date.now() - inicio;
                    const restante = Math.max(0, ms - transcurrido);
                    
                    timerText.innerText = (restante / 1000).toFixed(1) + 's';

                    if (restante <= 0) {
                        clearInterval(intervalo);
                        resolve();
                    }
                }, 50);
            });
        }

        // --- REPRODUCIR MEMO ---
        async function playMemo() {
            purgarLineasVacias(); 

            const lineasDivs = memoBox.querySelectorAll('.cmd-line');
            if (lineasDivs.length === 0) return;

            btnPlay.innerText = "⏳ Ejecutando...";
            btnPlay.disabled = true;
            timerBadge.style.display = 'inline-flex';

            console.log("--- Reproduciendo secuencia ---");

            for (let i = 0; i < lineasDivs.length; i++) {
                const elemento = lineasDivs[i];

                if (elemento.classList.contains('cmd-invalid')) {
                    continue; 
                }

                const linea = elemento.innerText.trim();
                const partes = linea.split(',');
                if (partes.length < 2) continue;

                const delayRelativo = parseInt(partes[0]);
                const comando = partes.slice(1).join(','); 

                // 1. ESPERA VISUAL CON CUENTA REGRESIVA
                if (delayRelativo > 0) {
                    await esperarConTimer(delayRelativo);
                } else {
                    timerText.innerText = "0.0s";
                }

                // 2. CAMBIAR RESALTADO DE LÍNEA
                lineasDivs.forEach(el => el.classList.remove('cmd-executing'));
                elemento.classList.add('cmd-executing');
                elemento.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

                // 3. ENVIAR POR TRANSMISOR HÍBRIDO (BLE / WI-FI) Y ACTUALIZAR SLIDERS
                transmitirComando(comando);
                actualizarInterfazPorComando(comando);
            }

            // 4. PAUSA FINAL DE 1 SEGUNDO EN LA ÚLTIMA LÍNEA
            await esperarConTimer(1000);

            // Restablecer interfaz
            lineasDivs.forEach(el => el.classList.remove('cmd-executing'));
            timerBadge.style.display = 'none';
            btnPlay.innerText = "▶️ Reproducir";
            btnPlay.disabled = false;

            console.log("--- Fin de la reproducción ---");
        }

        function actualizarInterfazPorComando(comando) {
            const partes = comando.split(',');
            if (partes.length > 0) {
                const parArticulacion = partes[0].split(':');
                if (parArticulacion.length === 2) {
                    const artId = parArticulacion[0];
                    const anguloVal = parArticulacion[1];

                    const slider = document.getElementById(artId);
                    const box = document.getElementById(artId + 'Box');
                    if (slider && box) {
                        slider.value = anguloVal;
                        box.innerText = anguloVal + '°';
                    }
                }
            }
        }

        // --- ARCHIVOS Y LIMPIEZA ---
        function solicitarLimpieza() {
            if (!memoBox.innerText.trim()) {
                limpiarDirecto();
                return;
            }
            document.getElementById('modalConfirm').style.display = 'flex';
        }

        function responderBorrado(opcion) {
            document.getElementById('modalConfirm').style.display = 'none';

            if (opcion === 'si') {
                guardarArchivo();
                limpiarDirecto();
            } else if (opcion === 'no') {
                limpiarDirecto();
            }
        }

        function limpiarDirecto() {
            memoBox.innerHTML = "";
            tiempoUltimoComando = 0;
        }

        function guardarArchivo() {
            purgarLineasVacias(); 
            const texto = memoBox.innerText;
            if (!texto.trim()) {
                alert("El Memo está vacío, no hay nada que guardar.");
                return;
            }

            const blob = new Blob([texto], { type: "text/plain;charset=utf-8" });
            const enlace = document.createElement("a");
            enlace.download = "rutina_brazo.txt";
            enlace.href = URL.createObjectURL(blob);
            enlace.click();
            URL.revokeObjectURL(enlace.href);
        }

        function cargarArchivo(event) {
            const archivo = event.target.files[0];
            if (!archivo) return;

            const lector = new FileReader();
            lector.onload = function(e) {
                memoBox.innerText = e.target.result;
                reparsearLineas(); 
                tiempoUltimoComando = 0;
            };
            lector.readAsText(archivo);
            event.target.value = '';
        }
    </script>
</body>
</html>
