<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Brazo Robot</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #1e1e1e;
            border-bottom: 1px solid #333;
        }

        .btn-ble {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-ble.connected {
            background-color: #28a745;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .controls-panel {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            justify-content: center;
            max-width: 450px;
            background-color: #181818;
        }

        .speed-panel {
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            margin-bottom: 10px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #222;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .label-name {
            width: 110px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .slider {
            flex: 1;
            accent-color: #007acc;
            cursor: pointer;
        }

        .angle-box {
            width: 55px;
            background-color: #000;
            border: 1px solid #444;
            border-radius: 4px;
            text-align: center;
            padding: 4px 0;
            font-family: monospace;
            font-size: 0.9rem;
            color: #00ffcc;
        }

        .viewer-panel {
            flex: 1.2;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: #121212;
        }

        .viewer-panel img {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <header>
        <h2>Mando Brazo Robótico</h2>
        <button id="connectBle" class="btn-ble">🔌 Conectar BLE</button>
    </header>

    <div class="main-container">
        <div class="controls-panel">
            
            <div class="speed-panel">
                <div class="control-group" style="background: #2a2015; border-color: #ff990022;">
                    <span class="label-name" style="color: #ff9900;">Velocidad</span>
                    <input type="range" min="1" max="45" value="10" class="slider" id="speedSlider" style="accent-color: #ff9900;">
                    <span class="angle-box" id="speedBox" style="color: #ff9900;">10°/s</span>
                </div>
            </div>

            <div class="control-group">
                <span class="label-name">Pinza</span>
                <input type="range" min="0" max="180" value="90" class="slider" id="pinza">
                <span class="angle-box" id="pinzaBox">90°</span>
            </div>

            <div class="control-group">
                <span class="label-name">Muñeca (Giro)</span>
                <input type="range" min="0" max="180" value="90" class="slider" id="munecaGiro">
                <span class="angle-box" id="munecaGiroBox">90°</span>
            </div>

            <div class="control-group">
                <span class="label-name">Muñeca</span>
                <input type="range" min="0" max="180" value="90" class="slider" id="muneca">
                <span class="angle-box" id="munecaBox">90°</span>
            </div>

            <div class="control-group">
                <span class="label-name">Codo</span>
                <input type="range" min="0" max="180" value="90" class="slider" id="codo">
                <span class="angle-box" id="codoBox">90°</span>
            </div>

            <div class="control-group">
                <span class="label-name">Hombro</span>
                <input type="range" min="0" max="180" value="90" class="slider" id="hombro">
                <span class="angle-box" id="hombroBox">90°</span>
            </div>

            <div class="control-group">
                <span class="label-name">Rotación Base</span>
                <input type="range" min="0" max="180" value="90" class="slider" id="rotacion">
                <span class="angle-box" id="rotacionBox">90°</span>
            </div>

        </div>

        <div class="viewer-panel">
            <img src="edited-image.png" alt="Brazo Robot">
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // Vincular interfaz a los cuadros de texto dinámicos
        const ids = ['pinza', 'munecaGiro', 'muneca', 'codo', 'hombro', 'rotacion'];
        
        ids.forEach(id => {
            const slider = document.getElementById(id);
            const box = document.getElementById(id + 'Box');
            slider.addEventListener('input', () => {
                box.innerText = slider.value + '°';
                enviarComando(id, slider.value);
            });
        });

        // Control del Slider de Velocidad
        const speedSlider = document.getElementById('speedSlider');
        const speedBox = document.getElementById('speedBox');
        speedSlider.addEventListener('input', () => {
            speedBox.innerText = speedSlider.value + '°/s';
        });

        // Simulación o envío real de la trama de datos
        function enviarComando(articulacion, angulo) {
            const velocidadActual = speedSlider.value;
            // Aquí compones la cadena. Por ejemplo: "Hombro:120,V:10"
            console.log(`Enviando por BLE -> ID: ${articulacion}, Ángulo: ${angulo}°, Vel: ${velocidadActual}°/s`);
        }
    </script>
</body>
</html>
