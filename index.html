<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brazo Robótico BLE</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            padding: 20px;
            margin: 0;
        }
        .btn-connect {
            background-color: #007bff;
            color: white;
            padding: 14px 28px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .grid-control {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }
        .btn-cmd {
            background-color: #28a745;
            color: white;
            padding: 22px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-cmd:active { background-color: #1e7e34; transform: scale(0.96); }
        #status { margin-top: 15px; font-weight: bold; color: #666; }
    </style>
</head>
<body>

    <h1>Control del Brazo Robótico</h1>
    <button class="btn-connect" onclick="conectarBLE()">🔌 Conectar Brazo</button>
    <div id="status">Estado: Desconectado</div>

    <br><br>

    <div class="grid-control">
        <button class="btn-cmd" onclick="enviarComando('A')">⬅️ Izquierda</button>
        <button class="btn-cmd" onclick="enviarComando('D')">Derecha ➡️</button>
        <button class="btn-cmd" onclick="enviarComando('W')">⬆️ Arriba</button>
        <button class="btn-cmd" onclick="enviarComando('S')">Abajo ⬇️</button>
        <button class="btn-cmd" onclick="enviarComando('O')">✊ Abrir Pinza</button>
        <button class="btn-cmd" onclick="enviarComando('C')">🖐️ Cerrar Pinza</button>
    </div>

<script>
    const NORDIC_UART_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const RX_CHARACTERISTIC_UUID   = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";

    let rxCharacteristic = null;
    let bleDevice = null;

    async function conectarBLE() {
        const statusDiv = document.getElementById('status');
        try {
            statusDiv.innerHTML = "Buscando cualquier dispositivo Bluetooth...";
        
            // MODO LAXO: Acepta todo lo que encuentre en el aire
            bleDevice = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [NORDIC_UART_SERVICE_UUID] // Avisamos qué carpeta abriremos después
            });

            statusDiv.innerHTML = "Conectando...";
            const server = await bleDevice.gatt.connect();
        
            statusDiv.innerHTML = "Abriendo canal UART...";
            const service = await server.getPrimaryService(NORDIC_UART_SERVICE_UUID);
            rxCharacteristic = await service.getCharacteristic(RX_CHARACTERISTIC_UUID);

            statusDiv.innerHTML = "🟢 ¡Conectado a " + bleDevice.name + "!";
            statusDiv.style.color = "green";

            bleDevice.addEventListener('gattserverdisconnected', () => {
                statusDiv.innerHTML = "🔴 Dispositivo desconectado";
                statusDiv.style.color = "red";
                rxCharacteristic = null;
            });
        } catch (error) {
            statusDiv.innerHTML = "❌ Error: " + error.message;
            statusDiv.style.color = "red";
        }
    }

    async function enviarComando(letra) {
        if (!rxCharacteristic) {
            alert("¡Primero debes conectar el Bluetooth!");
            return;
        }
        try {
            const encoder = new TextEncoder();
            await rxCharacteristic.writeValue(encoder.encode(letra));
            console.log("Enviado: " + letra);
        } catch (error) {
            console.error("Error:", error);
        }
    }

    // REGISTRO DEL SERVICE WORKER (Para que funcione Offline)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker registrado con éxito'))
                .catch(err => console.error('Error al registrar Service Worker', err));
        });
    }
</script>
</body>
</html>
