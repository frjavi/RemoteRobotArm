<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Brazo Robot</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #1e1e1e;
            border-bottom: 1px solid #333;
        }

        .btn-ble {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-ble.connected {
            background-color: #28a745;
        }

        /* --- 1. EL ÁREA GENERAL DE LA PÁGINA --- */
        .main-container {
            display: flex;
            flex: 1;
            padding: 20px;
            justify-content: flex-start;
            align-items: flex-start; /* Todo alineado arriba */
            background-color: #121212;
        }

        /* --- 2. EL PANEL PADRE REAL QUE PROPUSISTE (LA TARJETA CONTENEDORA) --- */
        .tarjeta-control {
            display: inline-flex;    /* ◄ CLAVE: Mide estrictamente el ancho de lo que tenga dentro */
            flex-direction: row;
            align-items: stretch;    /* ◄ Fuerza a que el visor y los sliders midan exactamente lo mismo de alto */
            background-color: #181818;
            border: 2px solid #444;  /* Borde visible para que veas el contenedor real */
            border-radius: 12px;
            overflow: hidden;        /* No deja que nada se salga del borde redondeado */
            height: fit-content;     /* ◄ Su altura depende exclusivamente del bloque de sliders */
        }

        /* --- 3. EL PANEL DE SLIDERS (EL MOLDE DE LA ALTURA) --- */
        .controls-panel {
            width: 240px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-color: #181818;
            box-sizing: border-box;
        }

        .speed-panel {
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-bottom: 5px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #222;
            padding: 6px 8px;
            border-radius: 8px;
            border: 1px solid #333;
            height: 36px;            /* Altura fija por fila para tus líneas indicadoras */
            box-sizing: border-box;
        }

        .label-name {
            width: 75px;
            font-weight: bold;
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .slider {
            flex: 1;
            min-width: 0;
            accent-color: #007acc;
            cursor: pointer;
        }

        .angle-box {
            width: 45px;
            background-color: #000;
            border: 1px solid #444;
            border-radius: 4px;
            text-align: center;
            padding: 2px 0;
            font-family: monospace;
            font-size: 0.8rem;
            color: #00ffcc;
        }

        /* --- 4. EL PANEL DE LA IMAGEN (SE ADAPTA AL PADRE) --- */
        .viewer-panel {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            background-color: #121212;
            border-left: 1px solid #333;
            box-sizing: border-box;
        }

        .viewer-panel img {
            height: 100%;            /* ◄ Mide el 100% de la altura de la tarjeta (dictada por los sliders) */
            width: 320px;            /* ◄ ANCHO FIJO CONTROLADO: Modifica este valor (ej. 350px, 400px) según tu dibujo */
            object-fit: fill;        /* Estira o encoge verticalmente el dibujo de forma exacta */
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <h2 style="margin:0; font-size:1.3rem;">Mando Brazo Robótico</h2>
        <button id="connectBle" class="btn-ble">🔌 Conectar BLE</button>
    </header>

    <div class="main-container">
        
        <div class="tarjeta-control">
            
            <div class="controls-panel">
                <div class="speed-panel">
                    <div class="control-group" style="background: #2a2015; border-color: #ff990044;">
                        <span class="label-name" style="color: #ff9900;">Velocidad</span>
                        <input type="range" min="1" max="45" value="10" class="slider" id="speedSlider" style="accent-color: #ff9900;">
                        <span class="angle-box" id="speedBox" style="color: #ff9900;">10°/s</span>
                    </div>
                </div>

                <div class="control-group"><span class="label-name">Pinza</span><input type="range" min="0" max="180" value="90" class="slider" id="pinza"><span class="angle-box" id="pinzaBox">90°</span></div>
                <div class="control-group"><span class="label-name">M. Giro</span><input type="range" min="0" max="270" value="135" class="slider" id="munecaGiro"><span class="angle-box" id="munecaGiroBox">135°</span></div>
                <div class="control-group"><span class="label-name">Muñeca</span><input type="range" min="0" max="270" value="135" class="slider" id="muneca"><span class="angle-box" id="munecaBox">135°</span></div>
                <div class="control-group"><span class="label-name">Codo</span><input type="range" min="0" max="270" value="135" class="slider" id="codo"><span class="angle-box" id="codoBox">135°</span></div>
                <div class="control-group"><span class="label-name">Hombro</span><input type="range" min="0" max="270" value="135" class="slider" id="hombro"><span class="angle-box" id="hombroBox">135°</span></div>
                <div class="control-group"><span class="label-name">Base</span><input type="range" min="0" max="270" value="135" class="slider" id="rotacion"><span class="angle-box" id="rotacionBox">135°</span></div>
            </div>

            <div class="viewer-panel">
                <img src="RobotArmPic.png" alt="Brazo Robot">
            </div>

        </div> </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let txCharacteristic = null;
        const connectBtn = document.getElementById('connectBle');
        const speedSlider = document.getElementById('speedSlider');
        const speedBox = document.getElementById('speedBox');

        speedSlider.addEventListener('input', () => {
            speedBox.innerText = speedSlider.value + '°/s';
        });

        const ids = ['pinza', 'munecaGiro', 'muneca', 'codo', 'hombro', 'rotacion'];
        ids.forEach(id => {
            const slider = document.getElementById(id);
            const box = document.getElementById(id + 'Box');

            slider.addEventListener('input', () => {
                box.innerText = slider.value + '°';
            });

            slider.addEventListener('change', () => {
                box.innerText = slider.value + '°';
                enviarTrama(id, slider.value);
            });
        });

        connectBtn.addEventListener('click', async () => {
            try {
                connectBtn.innerText = "🔍 Buscando...";
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
                });

                connectBtn.innerText = "⚡ Conectando...";
                const server = await device.gatt.connect();
                
                try {
                    const service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
                    txCharacteristic = await service.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');
                } catch (e) {
                    console.log("No usa servicio UART estándar, pero conectado.");
                }

                connectBtn.innerText = "🟢 ¡Conectado!";
                connectBtn.classList.add('connected');
            } catch (error) {
                console.error(error);
                connectBtn.innerText = "❌ Error / Cancelado";
                connectBtn.classList.remove('connected');
            }
        });

        function enviarTrama(articulacion, angulo) {
            const velocidad = speedSlider.value;
            const cadena = `${articulacion}:${angulo},v:${velocidad}\n`;
            
            console.log("Enviando por BLE:", cadena);

            if (txCharacteristic) {
                const encoder = new TextEncoder();
                txCharacteristic.writeValue(encoder.encode(cadena))
                    .catch(err => console.log("Error al transmitir por BLE:", err));
            }
        }
    </script>
</body>
</html>
