<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Brazo Robot</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #1e1e1e;
            border-bottom: 1px solid #333;
        }

        .btn-ble {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-ble.connected {
            background-color: #28a745;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .controls-panel {
            width: 380px;
            min-width: 350px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px; /* Espaciado fijo y controlado */
            justify-content: flex-start; /* Todo alineado hacia arriba, sin huecos raros */
            background-color: #181818;
            border-right: 1px solid #333;
            overflow-y: auto;
        }

        .speed-panel {
            border-bottom: 2px solid #333;
            padding-bottom: 12px;
            margin-bottom: 5px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #222;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .label-name {
            width: 110px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .slider {
            flex: 1;
            accent-color: #007acc;
            cursor: pointer;
        }

        .angle-box {
            width: 55px;
            background-color: #000;
            border: 1px solid #444;
            border-radius: 4px;
            text-align: center;
            padding: 4px 0;
            font-family: monospace;
            font-size: 0.9rem;
            color: #00ffcc;
        }

        .viewer-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #121212;
        }

        .viewer-panel img {
            max-width: 95%;
            max-height: 90vh;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <header>
        <h2 style="margin:0; font-size:1.3rem;">Mando Brazo Robótico</h2>
        <button id="connectBle" class="btn-ble">🔌 Conectar BLE</button>
    </header>

    <div class="main-container">
        <div class="controls-panel">
            
            <div class="speed-panel">
                <div class="control-group" style="background: #2a2015; border-color: #ff990044;">
                    <span class="label-name" style="color: #ff9900;">Velocidad</span>
                    <input type="range" min="1" max="45" value="10" class="slider" id="speedSlider" style="accent-color: #ff9900;">
                    <span class="angle-box" id="speedBox" style="color: #ff9900;">10°/s</span>
                </div>
            </div>

            <div class="control-group"><span class="label-name">Pinza</span><input type="range" min="0" max="180" value="90" class="slider" id="pinza"><span class="angle-box" id="pinzaBox">90°</span></div>
            <div class="control-group"><span class="label-name">Muñeca (Giro)</span><input type="range" min="0" max="180" value="90" class="slider" id="munecaGiro"><span class="angle-box" id="munecaGiroBox">90°</span></div>
            <div class="control-group"><span class="label-name">Muñeca</span><input type="range" min="0" max="180" value="90" class="slider" id="muneca"><span class="angle-box" id="munecaBox">90°</span></div>
            <div class="control-group"><span class="label-name">Codo</span><input type="range" min="0" max="180" value="90" class="slider" id="codo"><span class="angle-box" id="codoBox">90°</span></div>
            <div class="control-group"><span class="label-name">Hombro</span><input type="range" min="0" max="180" value="90" class="slider" id="hombro"><span class="angle-box" id="hombroBox">90°</span></div>
            <div class="control-group"><span class="label-name">Rotación Base</span><input type="range" min="0" max="180" value="90" class="slider" id="rotacion"><span class="angle-box" id="rotacionBox">90°</span></div>

        </div>

        <div class="viewer-panel">
            <img src="edited-image.png" alt="Brazo Robot">
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let txCharacteristic = null;
        const connectBtn = document.getElementById('connectBle');
        const speedSlider = document.getElementById('speedSlider');
        const speedBox = document.getElementById('speedBox');

        // Escuchar el deslizador de velocidad
        speedSlider.addEventListener('input', () => {
            speedBox.innerText = speedSlider.value + '°/s';
        });

        // Configurar los 6 deslizadores de las articulaciones
        const ids = ['pinza', 'munecaGiro', 'muneca', 'codo', 'hombro', 'rotacion'];
        ids.forEach(id => {
            const slider = document.getElementById(id);
            const box = document.getElementById(id + 'Box');
            slider.addEventListener('change', () => {
                box.innerText = slider.value + '°';
                enviarTrama(id, slider.value);
            });
        });

        // Lógica de Conexión BLE (Modo Laxo / Acepta cualquier dispositivo)
        connectBtn.addEventListener('click', async () => {
            try {
                connectBtn.innerText = "🔍 Buscando...";
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e'] // UUID típico del servicio UART de Nordic
                });

                connectBtn.innerText = "⚡ Conectando...";
                const server = await device.gatt.connect();
                
                // Intentamos pillar el servicio UART si existe
                try {
                    const service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
                    txCharacteristic = await service.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');
                } catch (e) {
                    console.log("No usa servicio UART estándar, pero conectado.");
                }

                connectBtn.innerText = "🟢 ¡Conectado!";
                connectBtn.classList.add('connected');
            } catch (error) {
                console.error(error);
                connectBtn.innerText = "❌ Error / Cancelado";
                connectBtn.classList.remove('connected');
            }
        });

        // Enviar datos hacia el ESP32-S3
        function enviarTrama(articulacion, angulo) {
            const velocidad = speedSlider.value;
            // Estructura de la cadena de texto: "articulacion:angulo,v:velocidad"
            // Ejemplo: "hombro:120,v:10"
            const cadena = `${articulacion}:${angulo},v:${velocidad}\n`;
            
            console.log("Enviando local:", cadena);

            if (txCharacteristic) {
                const encoder = new TextEncoder();
                txCharacteristic.writeValue(encoder.encode(cadena))
                    .catch(err => console.log("Error al transmitir por BLE:", err));
            }
        }
    </script>
</body>
</html>
