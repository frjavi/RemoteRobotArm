<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Brazo Robot</title>
    <link rel="manifest" href="manifest.json">
   <style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #121212;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 20px;
        background-color: #1e1e1e;
        border-bottom: 1px solid #333;
    }

    .btn-ble {
        background-color: #007acc;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
    }

    .btn-ble.connected {
        background-color: #28a745;
    }

    .main-container {
        display: flex;
        flex: 1;
        overflow: hidden;
        align-items: flex-start;
        background-color: #121212;
    
        /* ◄ CLAVE: Dejamos 15px arriba, abajo e izquierda, pero 0px a la derecha */
        padding: 15px 0px 15px 15
    }

    /* --- EL CONTENEDOR PADRE CON ALTURA CONFIGURADA --- */
    .tarjeta-control {
        display: flex;
        flex-direction: row;
        background-color: #181818;
        border: 2px solid #444;
        border-radius: 12px;
        overflow: hidden;
        height: 275px !important;     /* ◄ Forzamos a que todo el bloque mida exactamente esto */
        max-height: 275px !important; /* Si tus líneas no cuadran, sube o baja este número (ej. 280px o 260px) */
        width: 95%; 
        max-width: 1200px;
    }

    /* --- PANEL DE SLIDERS --- */
    .controls-panel {
        flex: 1;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        background-color: #181818;
        border: 1px solid #333;
        /* ◄ Mantiene bordes redondeados a la izquierda, pero los de la derecha quedan rectos */
        border-radius: 8px 0 0 8px; 
        box-sizing: border-box;
        height: 100%;
    }

    .speed-panel {
        border-bottom: 2px solid #333;
        padding-bottom: 6px;
        margin-bottom: 2px;
    }

    .control-group {
        display: flex;
        align-items: center;
        gap: 2px;                /* ◄ REDUCIDO: Menos separación entre el texto, el slider y la caja */
        background: #222;
        padding: 2px 3px;        /* ◄ CLAVE: Reducido de 12px a solo 5px en los laterales para eliminar el espacio muerto */
        border-radius: 8px;
        border: 1px solid #333;
        height: 32px;
        box-sizing: border-box;
    }

    .label-name {
        width: 40px !important;     /* ◄ Reducido al mínimo para pegar el texto al slider */
        min-width: 40px !important; /* Evita que el navegador lo deforme */
        font-weight: bold;
        font-size: 0.8rem;
        white-space: nowrap;
        overflow: hidden;
    }

    .slider {
        flex: 2;             /* ◄ CLAVE: Le da prioridad absoluta al slider para que sea el que más espacio gane */
        min-width: 0;
        accent-color: #007acc;
        cursor: pointer;
    }

    .angle-box {
        width: 45px;
        min-width: 45px;
        background-color: #000;
        border: 1px solid #444;
        border-radius: 4px;
        text-align: center;
        padding: 2px 0;
        font-family: monospace;
        font-size: 0.8rem;
        color: #00ffcc;
    }

    /* --- VISOR DERECHO TOTALMENTE FRENADO --- */
    .viewer-panel {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        background-color: #121212;
    
        /* ◄ Cambiamos el borde gris a 1px para que colinde limpiamente con el panel */
        border: 1px solid #333;
        border-left: none; /* Elimina el doble borde en la unión */
    
        /* ◄ Redondeado solo en las esquinas derechas para cerrar la tarjeta */
        border-radius: 0 8px 8px 0; 
        box-sizing: border-box;
        height: 100%;
        padding: 0;        /* ◄ Forzamos a que no exista margen interno que separe la foto */
        margin: 0;         /* ◄ Asegura distancia cero */
    }

    .viewer-panel img {
        height: 100% !important;
        width: auto !important;
        object-fit: contain;
        display: block;
    }
</style>
</head>
<body>

    <header>
        <h2 style="margin:0; font-size:1.3rem;">Mando Brazo Robótico</h2>
        <button id="connectBle" class="btn-ble">🔌 Conectar BLE</button>
    </header>

    <div class="main-container">
        
        <div class="tarjeta-control">
            
            <div class="controls-panel">
                <div class="speed-panel">
                    <div class="control-group" style="background: #2a2015; border-color: #ff990044;">
                        <span class="label-name" style="color: #ff9900;">Velocidad</span>
                        <input type="range" min="1" max="45" value="10" class="slider" id="speedSlider" style="accent-color: #ff9900;">
                        <span class="angle-box" id="speedBox" style="color: #ff9900;">10°/s</span>
                    </div>
                </div>

                <div class="control-group"><span class="label-name">Pinza</span><input type="range" min="0" max="180" value="90" class="slider" id="pinza"><span class="angle-box" id="pinzaBox">90°</span></div>
                <div class="control-group"><span class="label-name">M. Giro</span><input type="range" min="0" max="270" value="135" class="slider" id="munecaGiro"><span class="angle-box" id="munecaGiroBox">135°</span></div>
                <div class="control-group"><span class="label-name">Muñeca</span><input type="range" min="0" max="270" value="135" class="slider" id="muneca"><span class="angle-box" id="munecaBox">135°</span></div>
                <div class="control-group"><span class="label-name">Codo</span><input type="range" min="0" max="270" value="135" class="slider" id="codo"><span class="angle-box" id="codoBox">135°</span></div>
                <div class="control-group"><span class="label-name">Hombro</span><input type="range" min="0" max="270" value="135" class="slider" id="hombro"><span class="angle-box" id="hombroBox">135°</span></div>
                <div class="control-group"><span class="label-name">Base</span><input type="range" min="0" max="270" value="135" class="slider" id="rotacion"><span class="angle-box" id="rotacionBox">135°</span></div>
            </div>

            <div class="viewer-panel">
                <img src="RobotArmPic.png" alt="Brazo Robot">
            </div>

        </div> </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let txCharacteristic = null;
        const connectBtn = document.getElementById('connectBle');
        const speedSlider = document.getElementById('speedSlider');
        const speedBox = document.getElementById('speedBox');

        speedSlider.addEventListener('input', () => {
            speedBox.innerText = speedSlider.value + '°/s';
        });

        const ids = ['pinza', 'munecaGiro', 'muneca', 'codo', 'hombro', 'rotacion'];
        ids.forEach(id => {
            const slider = document.getElementById(id);
            const box = document.getElementById(id + 'Box');

            slider.addEventListener('input', () => {
                box.innerText = slider.value + '°';
            });

            slider.addEventListener('change', () => {
                box.innerText = slider.value + '°';
                enviarTrama(id, slider.value);
            });
        });

        connectBtn.addEventListener('click', async () => {
            try {
                connectBtn.innerText = "🔍 Buscando...";
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
                });

                connectBtn.innerText = "⚡ Conectando...";
                const server = await device.gatt.connect();
                
                try {
                    const service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
                    txCharacteristic = await service.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');
                } catch (e) {
                    console.log("No usa servicio UART estándar, pero conectado.");
                }

                connectBtn.innerText = "🟢 ¡Conectado!";
                connectBtn.classList.add('connected');
            } catch (error) {
                console.error(error);
                connectBtn.innerText = "❌ Error / Cancelado";
                connectBtn.classList.remove('connected');
            }
        });

        function enviarTrama(articulacion, angulo) {
            const velocidad = speedSlider.value;
            const cadena = `${articulacion}:${angulo},v:${velocidad}\n`;
            
            console.log("Enviando por BLE:", cadena);

            if (txCharacteristic) {
                const encoder = new TextEncoder();
                txCharacteristic.writeValue(encoder.encode(cadena))
                    .catch(err => console.log("Error al transmitir por BLE:", err));
            }
        }
    </script>
</body>
</html>
